<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoJuice POS Ultra</title>
  <style>
    * { box-sizing: border-box; transition: all 0.2s ease; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .app-container {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 1200px;
      width: 100%;
    }

    .calc-card {
      background: #161b22;
      padding: 30px;
      border-radius: 20px;
      width: 400px;
      border: 1px solid #30363d;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .calc-card h2 { text-align: center; color: #58a6ff; margin-bottom: 25px; letter-spacing: 1px; }
    label { font-size: 11px; font-weight: bold; color: #8b949e; text-transform: uppercase; display: block; margin-bottom: 5px; }

    select, input {
      width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px;
      border: 1px solid #30363d; background: #010409; color: #fff; font-size: 14px;
    }

    .btn {
      width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold;
      cursor: pointer; text-transform: uppercase; margin-bottom: 10px;
    }
    .btn-calc { background: #58a6ff; color: #ffffff; }
    .btn-log { background: #238636; color: #fff; }
    .btn-add { background: transparent; border: 1px dashed #484f58; color: #8b949e; }

    #hasil-display {
      font-size: 28px; font-weight: bold; text-align: center; color: #58a6ff; margin-top: 10px;
    }

    .receipt-section { width: 420px; }
    .receipt {
      background: #fff;
      color: #1a1a1a;
      padding: 25px;
      font-family: 'Courier New', monospace;
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
      position: relative;
    }

    .receipt::before, .receipt::after {
      content: ""; position: absolute; left: 0; width: 100%; height: 10px;
      background-size: 10px 10px;
    }
    .receipt::before { top: -10px; background-image: linear-gradient(-135deg, #fff 5px, transparent 0), linear-gradient(135deg, #fff 5px, transparent 0); }
    .receipt::after { bottom: -10px; background-image: linear-gradient(-45deg, #fff 5px, transparent 0), linear-gradient(45deg, #fff 5px, transparent 0); }

    .receipt-header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 15px; }
    
    .item-block { margin-bottom: 15px; border-bottom: 1px dashed #ccc; padding-bottom: 10px; position: relative; }
    .item-main { display: flex; justify-content: space-between; font-weight: bold; font-size: 14px; }
    .item-detail { font-size: 11px; color: #666; padding-left: 10px; margin-top: 3px; }
    
    .del-btn { 
      color: #ff4d4d; cursor: pointer; font-weight: bold; font-size: 16px; 
      position: absolute; right: -15px; top: -5px; padding: 5px;
    }

    .divider { border-top: 2px solid #000; margin: 10px 0; }

    .receipt-row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 13px; }
    .total-final { font-size: 20px; font-weight: 900; border-top: 1px solid #000; margin-top: 10px; padding-top: 5px; }
    
    .jasa-row { color: #1a7f37; font-weight: bold; }
    .vault-row { color: #005cc5; font-style: italic; }

    .toggle-btn { background: #30363d; color: #fff; width: 100%; margin-top: 15px; }
    #receipt-body { display: none; }
  </style>
</head>
<body>

<div class="app-container">
  <div class="calc-card">
    <h2>AUTOJUICE</h2>
    <label>Pilih Layanan</label>
    <select id="service-type" onchange="resetInputs()">
      <option value="">-- Pilih --</option>
      <option value="repair">Mechanical Repair (2.5x)</option>
      <option value="modif">Custom Modification (2.0x)</option>
      <option value="brother">Brotherhood Disc (1.8x)</option>
      <option value="ws_stored">Wworkshop Vault (1.5x)</option>
    </select>

    <div id="input-container"></div>
    <button class="btn btn-calc" onclick="runCalculation()">Hitung Harga</button>
    <button class="btn btn-log" onclick="logToReceipt()">Simpan ke Struk</button>
    <div id="hasil-display">$0.00</div>
  </div>

  <div class="receipt-section">
    <button class="btn toggle-btn" onclick="toggleReceipt()">Buka / Tutup Struk</button>
    
    <div id="receipt-body">
      <div class="receipt">
        <div class="receipt-header">
          <strong style="font-size: 18px;">AUTOJUICE WORKSHOP</strong><br>
          <span style="font-size: 11px;" id="r-date"></span>
        </div>

        <div id="receipt-items"></div>

        <div class="divider"></div>

        <div class="receipt-row">
          <span>Total Compo Terpakai:</span>
          <span id="final-compo">0</span>
        </div>
        
        <div class="receipt-row vault-row">
          <span>Harga Suku Cadang:</span>
          <span id="final-vault">$0.00</span>
        </div>
        
        <div class="receipt-row jasa-row">
          <span>Jasa Mekanik:</span>
          <span id="final-jasa">$0.00</span>
        </div>

        <div class="receipt-row total-final">
          <span>GRAND TOTAL</span>
          <span id="final-bill">$0.00</span>
        </div>

        <div style="text-align: center; font-size: 9px; margin-top: 30px; border-top: 1px solid #eee; padding-top: 10px;">
          HARAP SIMPAN STRUK UNTUK KLAIM GARANSI
        </div>
      </div>
      <button onclick="clearAllData()" style="background:transparent; color:#8b949e; border:none; width:100%; margin-top:30px; cursor:pointer; font-size:10px;">[ RESET SEMUA DATA ]</button>
    </div>
  </div>
</div>

<script>
let state = { bill: 0, vault: 0, compo: 0 };
let currentCalc = { bill: 0, compo: 0 };

const d = new Date();
const dateString = ("0" + d.getDate()).slice(-2) + "/" + ("0" + (d.getMonth() + 1)).slice(-2) + "/" + d.getFullYear();
document.getElementById('r-date').innerText = "Tanggal: " + dateString;

function toggleReceipt() {
  const b = document.getElementById('receipt-body');
  b.style.display = (b.style.display === 'block') ? 'none' : 'block';
}

function resetInputs() {
  const type = document.getElementById('service-type').value;
  const container = document.getElementById('input-container');
  container.innerHTML = "";
  document.getElementById('hasil-display').innerText = "$0.00";
  
  if (type === "repair") {
    container.innerHTML = `<input type="number" placeholder="Body Compo" class="in-val r-f"><input type="number" placeholder="Engine Compo" class="in-val r-f">`;
  } else if (type === "modif") {
    addInputField("m-f");
    container.innerHTML += `<button class="btn btn-add" onclick="addInputField('m-f')">+ Tambah Item</button>`;
  } else if (type === "brother") {
    container.innerHTML = `<select id="b-sub" onchange="brotherSub()"><option value="">-- Tipe --</option><option value="r">Repair</option><option value="m">Modif</option></select><div id="b-area"></div>`;
  } else if (type === "ws_stored") {
    addInputField("w-f");
    container.innerHTML += `<button class="btn btn-add" onclick="addInputField('w-f')">+ Tambah Item</button>`;
  }
}

function brotherSub() {
  const type = document.getElementById('b-sub').value;
  const area = document.getElementById('b-area');
  area.innerHTML = "";
  if (type === "r") area.innerHTML = `<input type="number" placeholder="Body (B)" class="in-val b-f"><input type="number" placeholder="Engine (B)" class="in-val b-f">`;
  else if (type === "m") {
    addInputField("b-f", "b-area");
    area.innerHTML += `<button class="btn btn-add" onclick="addInputField('b-f', 'b-area')">+ Tambah Item</button>`;
  }
}

function addInputField(cls, target = "input-container") {
  const area = document.getElementById(target);
  const input = document.createElement("input");
  input.type = "number"; input.placeholder = "Jumlah Compo"; input.className = "in-val " + cls;
  const btn = area.querySelector('button');
  btn ? area.insertBefore(input, btn) : area.appendChild(input);
}

function runCalculation() {
  let bill = 0; let compo = 0;
  document.querySelectorAll(".in-val").forEach(i => {
    let v = parseFloat(i.value) || 0;
    compo += v;
    if (i.classList.contains('r-f')) bill += v * 2.5;
    else if (i.classList.contains('m-f')) bill += v * 2;
    else if (i.classList.contains('w-f')) bill += v * 1.5;
    else if (i.classList.contains('b-f')) bill += v * 1.8;
  });
  currentCalc = { bill, compo };
  document.getElementById('hasil-display').innerText = "$" + bill.toLocaleString();
}

function logToReceipt() {
  if (currentCalc.bill <= 0) return alert("Hitung dulu nilainya!");
  
  const type = document.getElementById('service-type').value.toUpperCase().replace('_', ' ');
  const list = document.getElementById('receipt-items');
  const id = Date.now();
  
  const bill = currentCalc.bill;
  const compo = currentCalc.compo;
  const vault = compo * 1.5;
  const jasa = bill - vault;

  const div = document.createElement("div");
  div.className = "item-block";
  div.id = `item-${id}`;
  div.innerHTML = `
    <div class="del-btn" onclick="removeLog(${id}, ${bill}, ${vault}, ${compo})">×</div>
    <div class="item-main">
      <span>${type}</span>
      <span>$${bill.toFixed(2)}</span>
    </div>
    <div class="item-detail">
      • Compo: ${compo} unit<br>
      • Harga Suku Cadang: $${vault.toFixed(2)}<br>
      • Jasa Mekanik: $${jasa.toFixed(2)}
    </div>
  `;
  list.appendChild(div);

  state.bill += bill; state.vault += vault; state.compo += compo;
  updateUI();
  document.getElementById('receipt-body').style.display = 'block';
}

function removeLog(id, b, v, c) {
  document.getElementById(`item-${id}`).remove();
  state.bill -= b; state.vault -= v; state.compo -= c;
  updateUI();
}

function updateUI() {
  document.getElementById('final-bill').innerText = "$" + state.bill.toLocaleString('en-US', {minimumFractionDigits: 2});
  document.getElementById('final-vault').innerText = "$" + state.vault.toLocaleString('en-US', {minimumFractionDigits: 2});
  document.getElementById('final-compo').innerText = state.compo;
  document.getElementById('final-jasa').innerText = "$" + (state.bill - state.vault).toLocaleString('en-US', {minimumFractionDigits: 2});
}

function clearAllData() {
  if(confirm("Hapus semua data struk?")) {
    state = { bill: 0, vault: 0, compo: 0 };
    document.getElementById('receipt-items').innerHTML = "";
    updateUI();
  }
}
</script>
</body>
</html>
