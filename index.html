<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoJuice Calculator</title>
  <style>
    * { box-sizing: border-box; transition: all 0.2s ease; }

    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at top left, #1a1a2e, #16213e);
      color: #e0e0e0;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    .container {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 900px;
      width: 100%;
    }

    .box {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 20px;
      width: 400px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
      height: fit-content;
    }

    h2 { text-align: center; margin-bottom: 25px; color: #00d2ff; letter-spacing: 1px; }
    label { font-size: 11px; text-transform: uppercase; color: #888; font-weight: bold; }

    select, input {
      width: 100%; padding: 12px 15px; margin-top: 8px; margin-bottom: 15px;
      border-radius: 8px; border: 1px solid #333; background: #0f172a; color: #fff;
      font-size: 14px; outline: none;
    }

    select:focus, input:focus { border-color: #00d2ff; }

    button {
      width: 100%; padding: 12px; border-radius: 8px; border: none;
      font-weight: bold; cursor: pointer; text-transform: uppercase;
    }

    .add-btn { background: transparent; border: 1px dashed #2962ff; color: #2962ff; margin-bottom: 15px; }
    .calc-btn { background: linear-gradient(135deg, #00c853, #b2ff59); color: #000; margin-top: 10px; }
    .log-btn { background: #2962ff; color: #fff; margin-top: 10px; }

    .log-box {
      background: rgba(0, 0, 0, 0.3);
      padding: 25px;
      border-radius: 20px;
      width: 400px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
    }

    .log-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      margin-bottom: 8px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      animation: fadeIn 0.3s ease;
    }

    .log-item .info { display: flex; flex-direction: column; flex-grow: 1; }
    .log-item .info .cat { font-size: 10px; color: #00d2ff; font-weight: bold; }
    .log-item .info .val { font-size: 16px; color: #fff; }

    .del-item {
      width: 35px;
      height: 35px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(244, 67, 54, 0.15);
      color: #f44336;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
      border: 1px solid rgba(244, 67, 54, 0.3);
      margin-left: 15px;
      flex-shrink: 0;
    }

    .del-item:hover {
      background: #f44336;
      color: #fff;
      transform: scale(1.1);
    }

    .grand-total {
      margin-top: 20px;
      padding: 15px;
      background: rgba(255, 152, 0, 0.1);
      border: 1px solid #ff9800;
      border-radius: 10px;
      font-size: 22px;
      color: #ff9800;
      text-align: center;
      font-weight: bold;
    }

    .clear-btn { background: #333; color: #999; margin-top: 15px; padding: 8px; font-size: 11px; }
    .clear-btn:hover { background: #f44336; color: #fff; }

    .result { font-size: 26px; color: #00d2ff; text-align: center; margin-top: 15px; font-weight: bold; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(10px); }
      to { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="box">
    <h2>AutoJuice <br><span style="color: #fff;">Component Calculator</span></h2>
    <label>Main Category</label>
    <select id="type" onchange="gantiForm()">
      <option value="">Pilih Tipe</option>
      <option value="repair">Repair</option>
      <option value="modif">Modif</option>
      <option value="brother">Brother</option>
      <option value="ws_stored">WS Stored</option>
    </select>
    <div id="formArea"></div>
    <button class="calc-btn" onclick="hitung()">Check Price</button>
    <button class="log-btn" onclick="addToLog()">Add to Bill Log</button>
    <div class="result" id="hasil">Total: $0.00</div>
  </div>

  <div class="log-box">
    <h3 style="text-align: center; color: #888; margin-top: 0;">Bill / Log History</h3>
    <div id="logList"></div>
    <div class="grand-total" id="grandTotal">Grand Total: $0.00</div>
    <button class="clear-btn" onclick="clearLog()">Reset All History</button>
  </div>
</div>

<script>
let currentSubTotal = 0;
let grandTotal = 0;

function gantiForm() {
  let type = document.getElementById("type").value;
  let form = document.getElementById("formArea");
  form.innerHTML = "";
  document.getElementById("hasil").innerText = "Total: $0.00";
  currentSubTotal = 0;

  if (type === "repair") {
    form.innerHTML = `<input type="number" placeholder="Body Repair Amount" class="repair"><input type="number" placeholder="Engine Repair Amount" class="repair">`;
  } else if (type === "modif") {
    tambahInput("modif", 2);
    form.innerHTML += `<button class="add-btn" onclick="tambahInput('modif', 2)">+ Add Component</button>`;
  } else if (type === "brother") {
    form.innerHTML = `<select id="brotherType" onchange="gantiBrother()"><option value="">Pilih Brother Type</option><option value="repair">Repair</option><option value="modif">Modif</option></select><div id="brotherArea"></div>`;
  } else if (type === "ws_stored") {
    tambahInput("ws-input", 1.5);
    form.innerHTML += `<button class="add-btn" onclick="tambahInput('ws-input', 1.5)">+ Add Compo</button>`;
  }
}

function gantiBrother() {
  let area = document.getElementById("brotherArea");
  let type = document.getElementById("brotherType").value;
  area.innerHTML = "";
  if (type === "repair") {
    area.innerHTML = `<input type="number" placeholder="Body Repair (B)" class="brother-repair"><input type="number" placeholder="Engine Repair (B)" class="brother-repair">`;
  } else if (type === "modif") {
    tambahInput("brother-modif", 1.8, "brotherArea");
    area.innerHTML += `<button class="add-btn" onclick="tambahInput('brother-modif', 1.8, 'brotherArea')">+ Add Component</button>`;
  }
}

function tambahInput(className, harga, target = "formArea") {
  let form = document.getElementById(target);
  let input = document.createElement("input");
  input.type = "number";
  input.placeholder = "Amount / Price";
  input.className = className;
  let btn = form.querySelector('button');
  btn ? form.insertBefore(input, btn) : form.appendChild(input);
}

function hitung() {
  let total = 0;
  let type = document.getElementById("type").value;
  if (type === "repair") {
    document.querySelectorAll(".repair").forEach(i => total += (parseFloat(i.value) || 0) * 2.5);
  } else if (type === "modif") {
    document.querySelectorAll(".modif").forEach(i => total += (parseFloat(i.value) || 0) * 2);
  } else if (type === "ws_stored") {
    document.querySelectorAll(".ws-input").forEach(i => total += (parseFloat(i.value) || 0) * 1.5);
  } else if (type === "brother") {
    let bType = document.getElementById("brotherType").value;
    let cls = bType === "repair" ? ".brother-repair" : ".brother-modif";
    document.querySelectorAll(cls).forEach(i => total += (parseFloat(i.value) || 0) * 1.8);
  }
  currentSubTotal = total;
  document.getElementById("hasil").innerText = "Total: $" + total.toLocaleString('en-US', {minimumFractionDigits: 2});
}

function addToLog() {
  if (currentSubTotal <= 0) return alert("Hitung dulu bos!");
  let type = document.getElementById("type").value.replace('_', ' ').toUpperCase();
  let logList = document.getElementById("logList");
  let logId = Date.now();
  let val = currentSubTotal;

  let div = document.createElement("div");
  div.className = "log-item";
  div.id = `item-${logId}`;
  div.innerHTML = `
    <div class="info">
      <span class="cat">${type}</span>
      <span class="val">$${val.toLocaleString('en-US', {minimumFractionDigits: 2})}</span>
    </div>
    <div class="del-item" onclick="removeItem(${logId}, ${val})">×</div>
  `;
  logList.appendChild(div);
  grandTotal += val;
  updateGrandTotalDisplay();
}

function removeItem(id, amount) {
  document.getElementById(`item-${id}`).remove();
  grandTotal -= amount;
  if (grandTotal < 0) grandTotal = 0;
  updateGrandTotalDisplay();
}

function updateGrandTotalDisplay() {
  document.getElementById("grandTotal").innerText = "Grand Total: $" + grandTotal.toLocaleString('en-US', {minimumFractionDigits: 2});
}

function clearLog() {
  if(confirm("Hapus semua?")) {
    grandTotal = 0;
    document.getElementById("logList").innerHTML = "";
    updateGrandTotalDisplay();
  }
}
</script>
</body>
</html>
