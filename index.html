<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoJuice POS Ultra - Dev Mode</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    * { box-sizing: border-box; transition: all 0.2s ease; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      margin: 0;
      display: flex;
      justify-content: center;
      padding: 50px 0; 
      min-height: 100vh;
      overflow-x: hidden;
    }

    .main-wrapper {
      display: flex;
      gap: 40px;
      align-items: flex-start;
      justify-content: center;
      width: 95%;
      max-width: 1200px;
    }

    .calc-card {
      background: #161b22;
      padding: 30px;
      border-radius: 20px;
      width: 400px;
      border: 1px solid #30363d;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      flex-shrink: 0;
    }

    .calc-card h2 { text-align: center; color: #58a6ff; margin-bottom: 25px; letter-spacing: 1px; }
    label { font-size: 11px; font-weight: bold; color: #8b949e; text-transform: uppercase; display: block; margin-bottom: 5px; }

    select, input {
      width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px;
      border: 1px solid #30363d; background: #010409; color: #fff; font-size: 14px;
    }

    .btn {
      width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold;
      cursor: pointer; text-transform: uppercase; margin-bottom: 10px;
    }
    .btn-calc { background: #58a6ff; color: #ffffff; }
    .btn-log { background: #238636; color: #fff; }
    #hasil-display { font-size: 28px; font-weight: bold; text-align: center; color: #58a6ff; margin-top: 10px; }

    /* Receipt Section */
    #receipt-container {
      display: none;
      gap: 15px;
      align-items: flex-start;
    }

    .receipt {
      background: #fff;
      color: #000;
      padding: 40px 30px;
      width: 400px !important;
      font-family: 'Courier New', monospace;
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
      position: relative;
    }

    .receipt::before, .receipt::after {
      content: ""; position: absolute; left: 0; width: 100%; height: 10px;
      background-size: 10px 10px;
    }
    .receipt::before { top: -10px; background-image: linear-gradient(-135deg, #fff 5px, transparent 0), linear-gradient(135deg, #fff 5px, transparent 0); }
    .receipt::after { bottom: -10px; background-image: linear-gradient(-45deg, #fff 5px, transparent 0), linear-gradient(45deg, #fff 5px, transparent 0); }

    .receipt-header { text-align: center; border-bottom: 2px solid #000; padding-bottom: 15px; margin-bottom: 20px; color: #000; }
    .item-block { margin-bottom: 15px; border-bottom: 1px dashed #000; padding-bottom: 15px; position: relative; }
    .item-main { display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 14px; color: #000; }
    .item-title-wrap { display: flex; align-items: center; gap: 12px; }
    .del-btn { color: #f85149; cursor: pointer; font-size: 22px; line-height: 1; border: none; background: none; padding: 0; font-weight: bold; }
    .item-detail { font-size: 12px; color: #000; padding-left: 30px; margin-top: 8px; line-height: 1.6; font-weight: 600; }
    .divider { border-top: 2px solid #000; margin: 15px 0; }
    .receipt-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 14px; color: #000; }
    .jasa-row { color: #1a7f37; font-weight: bold; }
    .vault-row { color: #005cc5; font-style: italic; }
    .total-final { font-size: 22px; font-weight: 900; border-top: 2px solid #000; margin-top: 15px; padding-top: 10px; color: #000; }

    .fs-side-btn { background: #30363d; color: #fff; border: 1px solid #484f58; border-radius: 8px; width: 45px; height: 45px; display: flex; justify-content: center; align-items: center; cursor: pointer; font-size: 22px; }

    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.98); 
      display: none;
      z-index: 9999999;
      flex-direction: column;
    }

    .fs-nav {
      position: fixed; top: 0; left: 0; width: 100%;
      background: #161b22;
      padding: 20px;
      display: flex;
      justify-content: center;
      gap: 20px;
      border-bottom: 1px solid #30363d;
      z-index: 10000002;
    }

    .fs-btn { padding: 12px 30px; border-radius: 10px; font-weight: 800; cursor: pointer; border: none; color: white; font-size: 14px; }
    .btn-download { background: #238636; }
    .btn-close-fs { background: #f85149; }

    #fs-content { 
      flex: 1;
      overflow-y: auto;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 100px;
    }

    #fs-content .receipt {
      margin-top: 150px !important; 
    }

    .floating-controls { position: fixed; bottom: 25px; right: 25px; display: flex; gap: 12px; z-index: 100; }
    .btn-float { padding: 12px 25px; border-radius: 12px; font-size: 13px; cursor: pointer; border: none; font-weight: bold; }
    .btn-show { background: #1f6feb; color: white; }
    .btn-reset { background: #161b22; color: #f85149; border: 1px solid #f85149; }
  </style>
</head>
<body>

<div class="main-wrapper">
  <div class="calc-card">
    <h2>AUTOJUICE</h2>
    <label>Layanan</label>
    <select id="service-type" onchange="resetInputs()">
      <option value="">-- Pilih --</option>
      <option value="repair">Mechanical Repair</option>
      <option value="modif">Custom Modification</option>
      <option value="brother">Brotherhood Disc</option>
      <option value="ws_stored">WS Stored</option>
    </select>
    <div id="input-container"></div>
    <button class="btn btn-calc" onclick="runCalculation()">Hitung Harga</button>
    <button class="btn btn-log" onclick="logToReceipt()">Simpan ke Struk</button>
    <div id="hasil-display">$0</div>
  </div>

  <div id="receipt-container">
    <div id="receipt-wrap" class="receipt">
      <div class="receipt-header">
        <strong style="font-size: 18px;">AUTOJUICE WORKSHOP</strong><br>
        <span style="font-size: 11px;" id="r-date"></span>
      </div>
      <div id="receipt-items"></div>
      <div class="divider"></div>
      <div class="receipt-row"><span>Total Compo:</span><span id="final-compo">0</span></div>
      <div class="receipt-row vault-row"><span>Harga Suku Cadang:</span><span id="final-vault">$0.00</span></div>
      <div class="receipt-row jasa-row"><span>Jasa Mekanik:</span><span id="final-jasa">$0.00</span></div>
      <div class="receipt-row total-final"><span>GRAND TOTAL</span><span id="final-bill">$0.00</span></div>
    </div>
    <button class="fs-side-btn" onclick="enterFullscreen()">⛶</button>
  </div>
</div>

<div class="floating-controls">
  <button class="btn btn-float btn-reset" onclick="clearAllData()">Reset Data</button>
  <button class="btn btn-float btn-show" onclick="toggleReceipt()">Show/Hide Struk</button>
</div>

<div id="overlay">
  <div class="fs-nav">
    <button class="fs-btn btn-download" id="dl-png">DOWNLOAD PNG</button>
    <button class="fs-btn btn-close-fs" id="close-fs">TUTUP [ESC]</button>
  </div>
  <div id="fs-content"></div>
</div>

<script>
// ==========================================
// KONFIGURASI HARGA (EDIT DI SINI)
// ==========================================
const PRICING_CONFIG = {
  multipliers: {
    repair: 3.0,
    modif: 3.0,
    brother: 2.0,
    ws_stored: 2.0
  },
  sparepartPricePerUnit: 2.0 // Harga suku cadang per 1 compo
};

let state = { bill: 0, vault: 0, compo: 0 };
let currentCalc = { bill: 0, compo: 0 };

document.getElementById('r-date').innerText = "Tgl: " + new Date().toLocaleDateString('id-ID');

document.getElementById('dl-png').addEventListener('click', (e) => { e.preventDefault(); downloadReceipt(); });
document.getElementById('close-fs').addEventListener('click', (e) => { e.preventDefault(); exitFullscreen(); });
window.addEventListener('keydown', (e) => { if (e.key === 'Escape') exitFullscreen(); });

function toggleReceipt() {
  const container = document.getElementById('receipt-container');
  container.style.display = (container.style.display === 'flex') ? 'none' : 'flex';
}

function enterFullscreen() {
  const receipt = document.getElementById('receipt-wrap');
  const overlay = document.getElementById('overlay');
  const fsContent = document.getElementById('fs-content');
  fsContent.innerHTML = ""; 
  fsContent.appendChild(receipt);
  overlay.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function exitFullscreen() {
  const receipt = document.getElementById('receipt-wrap');
  const overlay = document.getElementById('overlay');
  const container = document.getElementById('receipt-container');
  if (overlay.style.display === 'flex') {
    container.insertBefore(receipt, container.firstChild);
    overlay.style.display = 'none';
    document.body.style.overflow = 'auto';
  }
}

function downloadReceipt() {
  const receipt = document.getElementById('receipt-wrap');
  const delBtns = receipt.querySelectorAll('.del-btn');
  delBtns.forEach(b => b.style.visibility = 'hidden');
  
  html2canvas(receipt, { 
    backgroundColor: "#ffffff", scale: 3, useCORS: true, scrollY: 0, 
    windowHeight: receipt.scrollHeight, height: receipt.scrollHeight 
  }).then(canvas => {
    const link = document.createElement('a');
    link.download = `Struk-AutoJuice-${Date.now()}.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();
    delBtns.forEach(b => b.style.visibility = 'visible');
  });
}

function resetInputs() {
  const type = document.getElementById('service-type').value;
  const container = document.getElementById('input-container');
  container.innerHTML = "";
  if (type === "repair") {
    container.innerHTML = `<input type="number" placeholder="Body Compo" class="in-val r-f"><input type="number" placeholder="Engine Compo" class="in-val r-f">`;
  } else if (type === "modif" || type === "ws_stored") {
    const cls = type === "modif" ? "m-f" : "w-f";
    addInputField(cls);
    container.innerHTML += `<button class="btn btn-add" style="background:transparent; border:1px dashed #484f58; color:#8b949e; width:100%; cursor:pointer;" onclick="addInputField('${cls}')">+ Tambah Item</button>`;
  } else if (type === "brother") {
    container.innerHTML = `<select id="b-sub" onchange="brotherSub()"><option value="">-- Tipe --</option><option value="r">Repair</option><option value="m">Modif</option></select><div id="b-area"></div>`;
  }
}

function brotherSub() {
  const type = document.getElementById('b-sub').value;
  const area = document.getElementById('b-area');
  area.innerHTML = "";
  if (type === "r") area.innerHTML = `<input type="number" placeholder="Body (B)" class="in-val b-f"><input type="number" placeholder="Engine (B)" class="in-val b-f">`;
  else if (type === "m") { 
    addInputField("b-f", "b-area"); 
    area.innerHTML += `<button class="btn btn-add" style="background:transparent; border:1px dashed #484f58; color:#8b949e; width:100%;" onclick="addInputField('b-f', 'b-area')">+ Item</button>`; 
  }
}

function addInputField(cls, target = "input-container") {
  const area = document.getElementById(target);
  const input = document.createElement("input");
  input.type = "number"; input.placeholder = "Jumlah Compo"; input.className = "in-val " + cls;
  const btn = area.querySelector('button');
  btn ? area.insertBefore(input, btn) : area.appendChild(input);
}

function runCalculation() {
  let bill = 0, compo = 0;
  const mult = PRICING_CONFIG.multipliers;

  document.querySelectorAll(".in-val").forEach(i => {
    let v = parseFloat(i.value) || 0;
    if (v < 0) v = 0; // Proteksi angka negatif
    compo += v;

    if (i.classList.contains('r-f')) bill += v * mult.repair;
    else if (i.classList.contains('m-f')) bill += v * mult.modif;
    else if (i.classList.contains('w-f')) bill += v * mult.ws_stored;
    else if (i.classList.contains('b-f')) bill += v * mult.brother;
  });

  currentCalc = { bill, compo };
  document.getElementById('hasil-display').innerText = "$" + bill.toLocaleString('en-US', {minimumFractionDigits: 2});
}

function logToReceipt() {
  if (currentCalc.bill <= 0) return;
  
  const type = document.getElementById('service-type').value.toUpperCase().replace('_', ' ');
  const list = document.getElementById('receipt-items');
  
  const bill = currentCalc.bill; 
  const compo = currentCalc.compo;
  const vault = compo * PRICING_CONFIG.sparepartPricePerUnit; 
  const jasa = bill - vault;
  
  const id = Date.now();
  const div = document.createElement("div");
  div.className = "item-block"; div.id = `item-${id}`;
  div.innerHTML = `
    <div class="item-main">
      <div class="item-title-wrap"><span class="del-btn" onclick="removeLog(${id}, ${bill}, ${vault}, ${compo})">×</span><span>${type}</span></div>
      <span style="white-space:nowrap; margin-left:15px;">$${bill.toLocaleString('en-US', {minimumFractionDigits: 2})}</span>
    </div>
    <div class="item-detail">
      <div>• Componen use : ${compo} Unit</div>
      <div>• Harga Suku Cadang : $${vault.toLocaleString('en-US', {minimumFractionDigits: 2})}</div>
      <div>• Jasa Mekanik : $${jasa.toLocaleString('en-US', {minimumFractionDigits: 2})}</div>
    </div>
  `;
  list.appendChild(div);
  
  state.bill += bill; 
  state.vault += vault; 
  state.compo += compo;
  
  updateUI();
  if(document.getElementById('receipt-container').style.display !== 'flex') toggleReceipt();
}

function removeLog(id, b, v, c) {
  const el = document.getElementById(`item-${id}`);
  if(el) {
    el.remove();
    state.bill -= b; state.vault -= v; state.compo -= c;
    updateUI();
  }
}

function updateUI() {
  const finalJasa = state.bill - state.vault;
  document.getElementById('final-bill').innerText = "$" + state.bill.toLocaleString('en-US', {minimumFractionDigits: 2});
  document.getElementById('final-vault').innerText = "$" + state.vault.toLocaleString('en-US', {minimumFractionDigits: 2});
  document.getElementById('final-compo').innerText = state.compo;
  document.getElementById('final-jasa').innerText = "$" + finalJasa.toLocaleString('en-US', {minimumFractionDigits: 2});
}

function clearAllData() {
  if(confirm("Reset semua isi struk?")) {
    state = { bill: 0, vault: 0, compo: 0 };
    document.getElementById('receipt-items').innerHTML = "";
    updateUI();
    document.getElementById('hasil-display').innerText = "$0";
  }
}
</script>
</body>
</html>
